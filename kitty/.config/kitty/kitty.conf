# kitty.conf - Ported from wezterm configuration

# Font
font_family      SauceCodePro Nerd Font Light
bold_font        SauceCodePro Nerd Font SemiBold
italic_font      SauceCodePro Nerd Font Light Italic
bold_italic_font SauceCodePro Nerd Font SemiBold Italic
font_size 12.0
modify_font cell_height 130%
modify_font cell_width 90%

# Cursor
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor

# Window
window_padding_width 10
hide_window_decorations titlebar-only
confirm_os_window_close 0

# Tab bar
tab_bar_edge bottom
tab_bar_style custom
tab_bar_min_tabs 2
tab_title_max_length 32

# Shell
shell /opt/homebrew/bin/fish

# Layouts (splits for pane management)
enabled_layouts splits:split_axis=horizontal,stack

# Remote control (enables theme switching via: kitten @ set-colors)
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# macOS
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
text_composition_strategy platform

# Scrollback
scrollback_lines 10000

# Theme: auto-switches via dark-theme.auto.conf / light-theme.auto.conf
# These are applied automatically by kitty based on macOS appearance

# Keybindings

# Splits
map cmd+d launch --cwd=current --location=vsplit
map cmd+shift+d launch --cwd=current --location=hsplit
map cmd+w close_window

# Pane navigation
map cmd+j next_window
map cmd+k previous_window
map cmd+r move_window_forward

# Pane resize (modal: cmd+shift+r, then h/j/k/l, esc/enter to exit)
map --new-mode resize cmd+shift+r
map --mode resize h resize_window narrower
map --mode resize j resize_window shorter
map --mode resize k resize_window taller
map --mode resize l resize_window wider
map --mode resize escape pop_keyboard_mode
map --mode resize enter pop_keyboard_mode

# Scroll
map ctrl+k scroll_line_up
map ctrl+j scroll_line_down

# Tab navigation
map cmd+ctrl+h previous_tab
map cmd+ctrl+l next_tab

# Rename tab
map cmd+e set_tab_title
